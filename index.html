<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Playbook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css">
    <style>
        :root {
            --base-background-color: #0f172a;
            --sidebar-background: #1e293b;
            --sidebar-nav-link-color--active: #60a5fa;
            --cover-background-color: #0f172a;
            --heading-color: #f1f5f9;
            --base-color: #cbd5e1;
            --code-inline-background: #1e293b;
            --code-inline-color: #60a5fa;
            --blockquote-border-color: #3b82f6;
            --search-result-keyword-color: #60a5fa;
        }
        .sidebar-nav li a { font-size: 14px; }
        .markdown-section { max-width: 800px; }
        .markdown-section table { width: 100%; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: 'Playbook',
            repo: 'https://github.com/ganna40/playbook',
            loadSidebar: true,
            subMaxLevel: 3,
            search: {
                placeholder: '검색...',
                noData: '결과 없음',
                depth: 3
            },
            auto2top: true,
            coverpage: false,
            notFoundPage: true,
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
